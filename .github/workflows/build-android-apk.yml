name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "App.tsx"
      - "app.json"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - ".github/workflows/build-android-apk.yml"

permissions:
  contents: write

jobs:
  build-apk:
    name: Build installable Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Prepare APK artifact
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/AI-Smart-Reminder-App-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Smart-Reminder-App-debug-apk
          path: release/AI-Smart-Reminder-App-debug.apk

      - name: Publish latest APK release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-apk-latest
          name: AI Smart Reminder App Android APK
          body: |
            Install this APK on an Android phone to test native local notifications, lock-screen notification delivery, and vibration behavior.

            This is a debug build for portfolio/demo testing.
          files: release/AI-Smart-Reminder-App-debug.apk
          prerelease: true
